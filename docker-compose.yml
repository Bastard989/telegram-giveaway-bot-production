services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-giveaway_bot}
      POSTGRES_USER: ${POSTGRES_USER:-giveaway_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-giveaway_bot}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - ./runtime/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-giveaway_bot} -d ${POSTGRES_DB:-giveaway_bot}"]
      interval: 5s
      timeout: 5s
      retries: 12
